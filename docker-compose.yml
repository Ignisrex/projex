services:
  postgres:
    image: postgres:16-alpine
    container_name: project-tracker-postgres
    environment:
      POSTGRES_DB: project_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private_net

  server:
    build:
      context: ./server
    container_name: project-tracker-server
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/project_tracker?sslmode=disable
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    networks:
      - public_net
      - private_net

  ui:
    build:
      context: ./ui
    container_name: project-tracker-ui
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - server
    ports:
      - "3000:3000"
    networks:
      - public_net

volumes:
  postgres_data:

networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge
